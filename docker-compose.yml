---
# StreamGraph local development stack
# ------------------------------------
# Services:
#   zookeeper     - Kafka coordination
#   kafka         - Message broker
#   kafka-ui      - Web UI for Kafka (Provectus)
#   redis         - Feast online store
#   flink-jm      - Flink JobManager
#   flink-tm      - Flink TaskManager (2 replicas)
#   generator     - Synthetic fraud ring transaction producer
#   prometheus    - Metrics scraping
#   grafana       - Dashboards

networks:
  streamgraph:
    driver: bridge

volumes:
  kafka-data:
  redis-data:
  flink-checkpoints:
  prometheus-data:
  grafana-data:

# ---------------------------------------------------------------------------
# Kafka stack
# ---------------------------------------------------------------------------

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: sg-zookeeper
    networks: [streamgraph]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: sg-kafka
    networks: [streamgraph]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"          # external (host) access
      - "9093:9093"          # internal container-to-container
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 134217728
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sg-kafka-init
    networks: [streamgraph]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [""]
    command:
      - bash
      - -c
      - >-
        kafka-topics --bootstrap-server kafka:9093 --create --if-not-exists --topic raw-transactions --partitions 8 --replication-factor 1 --config retention.ms=86400000 --config cleanup.policy=delete &&
        kafka-topics --bootstrap-server kafka:9093 --create --if-not-exists --topic fraud-alerts --partitions 4 --replication-factor 1 --config retention.ms=604800000 --config cleanup.policy=delete &&
        kafka-topics --bootstrap-server kafka:9093 --create --if-not-exists --topic entity-components --partitions 8 --replication-factor 1 --config retention.ms=3600000 --config cleanup.policy=delete &&
        echo 'Topics created successfully' &&
        kafka-topics --bootstrap-server kafka:9093 --list
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sg-kafka-ui
    networks: [streamgraph]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streamgraph
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      DYNAMIC_CONFIG_ENABLED: "true"

# ---------------------------------------------------------------------------
# Redis (Feast online store)
# ---------------------------------------------------------------------------

  redis:
    image: redis:7.2-alpine
    container_name: sg-redis
    networks: [streamgraph]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------
# Apache Flink
# ---------------------------------------------------------------------------

  flink-jm:
    image: apache/flink:1.19-scala_2.12-java11
    platform: linux/amd64
    container_name: sg-flink-jm
    hostname: flink-jm
    networks: [streamgraph]
    ports:
      - "8081:8081"        # Flink Web UI
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - ./src:/opt/streamgraph/src
      - ./generator:/opt/streamgraph/generator
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jm
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///opt/flink/checkpoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.min-pause: 30000
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    command: jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 20s
      timeout: 10s
      retries: 10

  flink-tm:
    image: apache/flink:1.19-scala_2.12-java11
    platform: linux/amd64
    networks: [streamgraph]
    hostname: flink-tm
    depends_on:
      flink-jm:
        condition: service_healthy
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - ./src:/opt/streamgraph/src
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jm
        taskmanager.numberOfTaskSlots: 4
        state.backend: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///opt/flink/checkpoints
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    command: taskmanager
    deploy:
      replicas: 2

# ---------------------------------------------------------------------------
# Synthetic data generator
# ---------------------------------------------------------------------------

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: sg-generator
    networks: [streamgraph]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      GENERATOR_KAFKA_BOOTSTRAP: kafka:9093
      GENERATOR_EVENTS_PER_SECOND: "300"
      GENERATOR_FRAUD_RING_RATIO: "0.08"
      GENERATOR_NUM_FRAUD_RINGS: "30"
    command: --kafka-bootstrap kafka:9093 --events-per-second 300

# ---------------------------------------------------------------------------
# PyFlink fraud detection pipeline
# ---------------------------------------------------------------------------

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: sg-pipeline
    networks: [streamgraph]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      FEAST_REDIS_HOST: redis
      FEAST_REPO_PATH: /app/feast
    volumes:
      - ./src:/app/src
    restart: on-failure

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: sg-prometheus
    networks: [streamgraph]
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.3.1
    container_name: sg-grafana
    networks: [streamgraph]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: streamgraph
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on: [prometheus]
